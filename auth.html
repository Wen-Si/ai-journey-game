<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI穿越之旅 - 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #00f0ff;
            --primary-dark: #00a8b5;
            --secondary: #ff00e4;
            --accent: #ffd700;
            --bg-dark: #050508;
            --bg-card: rgba(10, 10, 25, 0.9);
            --bg-glass: rgba(20, 20, 50, 0.6);
            --text-primary: #e0e0ff;
            --text-secondary: #8080a0;
            --border: rgba(0, 240, 255, 0.2);
            --glow: 0 0 20px rgba(0, 240, 255, 0.4);
            --glow-pink: 0 0 20px rgba(255, 0, 228, 0.4);
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 动态背景 */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 240, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(255, 0, 228, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 100%, rgba(0, 100, 255, 0.1) 0%, transparent 50%);
        }

        /* 网格背景 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-image: 
                linear-gradient(rgba(0, 240, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 240, 255, 0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        /* 浮动粒子 */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0;
        }

        @keyframes float {
            0% { opacity: 0; transform: translateY(100vh) scale(0); }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { opacity: 0; transform: translateY(-100vh) scale(1.5); }
        }

        /* 主容器 */
        .auth-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 480px;
            padding: 2rem;
        }

        /* Logo区域 */
        .logo-section {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            display: inline-block;
            animation: logoPulse 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.6));
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px rgba(0, 240, 255, 0.6)); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 40px rgba(0, 240, 255, 0.8)); }
        }

        .logo-title {
            font-family: 'Orbitron', monospace;
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary);
            text-shadow: var(--glow);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
        }

        .logo-subtitle {
            color: var(--text-secondary);
            font-size: 0.95rem;
            letter-spacing: 0.3em;
        }

        /* 卡片容器 */
        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 2.5rem;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 40px rgba(0, 240, 255, 0.1),
                inset 0 0 40px rgba(0, 240, 255, 0.05);
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(45deg, var(--primary), transparent, var(--secondary));
            border-radius: 24px;
            opacity: 0.3;
            z-index: -1;
            animation: borderRotate 4s linear infinite;
        }

        @keyframes borderRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 标签切换 */
        .tab-switcher {
            display: flex;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
        }

        .tab-btn {
            flex: 1;
            padding: 1rem;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            font-family: 'Noto Sans SC', sans-serif;
        }

        .tab-btn.active {
            color: var(--primary);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 20%;
            right: 20%;
            height: 2px;
            background: var(--primary);
            box-shadow: var(--glow);
        }

        .tab-btn:hover {
            color: var(--primary);
        }

        /* 表单 */
        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-label {
            display: block;
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-primary);
            font-size: 1rem;
            font-family: 'Noto Sans SC', sans-serif;
            transition: all 0.3s ease;
            outline: none;
        }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
        }

        .form-input::placeholder {
            color: rgba(128, 128, 160, 0.5);
        }

        /* 密码可见性切换 */
        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 1.2rem;
            padding: 0.2rem;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* 提交按钮 */
        .submit-btn {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border: none;
            border-radius: 12px;
            color: var(--bg-dark);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Noto Sans SC', sans-serif;
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .submit-btn:hover::before {
            left: 100%;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .submit-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 加载动画 */
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: var(--bg-dark);
            animation: spin 1s ease-in-out infinite;
            margin-left: 0.5rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 错误提示 */
        .error-msg {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            align-items: center;
            gap: 0.3rem;
        }

        .error-msg.show {
            display: flex;
        }

        /* 成功提示 */
        .success-msg {
            color: #2ed573;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
            align-items: center;
            gap: 0.3rem;
        }

        .success-msg.show {
            display: flex;
        }

        /* 装饰元素 */
        .corner-decoration {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--primary);
            opacity: 0.5;
        }

        .corner-decoration.top-left {
            top: 10px;
            left: 10px;
            border-right: none;
            border-bottom: none;
        }

        .corner-decoration.top-right {
            top: 10px;
            right: 10px;
            border-left: none;
            border-bottom: none;
        }

        .corner-decoration.bottom-left {
            bottom: 10px;
            left: 10px;
            border-right: none;
            border-top: none;
        }

        .corner-decoration.bottom-right {
            bottom: 10px;
            right: 10px;
            border-left: none;
            border-top: none;
        }

        /* 扫描线效果 */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), transparent);
            opacity: 0.3;
            animation: scan 8s linear infinite;
            z-index: 5;
            pointer-events: none;
        }

        @keyframes scan {
            0% { transform: translateY(0); }
            100% { transform: translateY(100vh); }
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .auth-container {
                padding: 1rem;
            }
            
            .logo-title {
                font-size: 1.8rem;
            }
            
            .auth-card {
                padding: 1.5rem;
            }
        }

        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>
    <div class="scan-line"></div>
    <div class="particles" id="particles"></div>

    <div class="auth-container">
        <div class="logo-section">
            <div class="logo-icon">🧠</div>
            <h1 class="logo-title">AI穿越之旅</h1>
            <p class="logo-subtitle">玩游戏 · 学AI · 探索智能的边界</p>
        </div>

        <div class="auth-card">
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>

            <div class="tab-switcher">
                <button class="tab-btn active" data-tab="login">登录</button>
                <button class="tab-btn" data-tab="register">注册</button>
            </div>

            <!-- 登录表单 -->
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="login-username" placeholder="输入你的用户名" required>
                    <div class="error-msg" id="login-username-error">⚠ 用户名不能为空</div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="login-password" placeholder="输入你的密码" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password')">👁️</button>
                    </div>
                    <div class="error-msg" id="login-password-error">⚠ 密码不能为空</div>
                </div>
                <button type="submit" class="submit-btn" id="login-btn">
                    登录
                </button>
                <div class="error-msg" id="login-error"></div>
                <div class="success-msg" id="login-success"></div>
            </form>

            <!-- 注册表单 -->
            <form id="register-form" class="auth-form hidden">
                <div class="form-group">
                    <label class="form-label">用户名</label>
                    <input type="text" class="form-input" id="reg-username" placeholder="创建用户名" required>
                    <div class="error-msg" id="reg-username-error">⚠ 用户名不能为空</div>
                </div>
                <div class="form-group">
                    <label class="form-label">密码</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="reg-password" placeholder="设置密码（至少6位）" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-password')">👁️</button>
                    </div>
                    <div class="error-msg" id="reg-password-error">⚠ 密码至少6位</div>
                </div>
                <div class="form-group">
                    <label class="form-label">确认密码</label>
                    <div class="password-wrapper">
                        <input type="password" class="form-input" id="reg-confirm" placeholder="再次输入密码" required>
                        <button type="button" class="toggle-password" onclick="togglePassword('reg-confirm')">👁️</button>
                    </div>
                    <div class="error-msg" id="reg-confirm-error">⚠ 两次密码不一致</div>
                </div>
                <button type="submit" class="submit-btn" id="register-btn">
                    注册
                </button>
                <div class="error-msg" id="register-error"></div>
                <div class="success-msg" id="register-success"></div>
            </form>
        </div>
    </div>

    <script>
        // 创建粒子
        function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (10 + Math.random() * 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        // 标签切换
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                const tab = btn.dataset.tab;
                document.querySelectorAll('.auth-form').forEach(form => form.classList.add('hidden'));
                document.getElementById(tab + '-form').classList.remove('hidden');
                
                // 清除错误信息
                document.querySelectorAll('.error-msg').forEach(e => e.classList.remove('show'));
                document.querySelectorAll('.success-msg').forEach(e => e.classList.remove('show'));
            });
        });

        // 密码可见性切换
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        // API基础URL - 根据环境自动切换
        const API_BASE = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
            ? window.location.origin
            : 'https://ai-journey-game.onrender.com';

        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value;
            
            // 验证
            let hasError = false;
            if (!username) {
                document.getElementById('login-username-error').classList.add('show');
                hasError = true;
            } else {
                document.getElementById('login-username-error').classList.remove('show');
            }
            
            if (!password) {
                document.getElementById('login-password-error').classList.add('show');
                hasError = true;
            } else {
                document.getElementById('login-password-error').classList.remove('show');
            }
            
            if (hasError) return;
            
            const btn = document.getElementById('login-btn');
            btn.disabled = true;
            btn.innerHTML = '登录中<span class="loading"></span>';
            
            let onlineSuccess = false;
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    onlineSuccess = true;
                    // 保存登录状态
                    localStorage.setItem('ai_journey_user', JSON.stringify({
                        userId: data.userId,
                        username: data.username,
                        token: data.token,
                        mode: 'online'
                    }));
                    
                    document.getElementById('login-success').textContent = '✓ 登录成功，正在进入游戏...';
                    document.getElementById('login-success').classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    // 在线登录返回错误（如密码错误），尝试本地验证
                    const localUser = verifyLocalUser(username, password);
                    if (localUser) {
                        localStorage.setItem('ai_journey_user', JSON.stringify({
                            userId: localUser.userId,
                            username: localUser.username,
                            mode: 'local'
                        }));
                        
                        document.getElementById('login-success').textContent = '✓ 登录成功（离线模式），正在进入游戏...';
                        document.getElementById('login-success').classList.add('show');
                        
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        document.getElementById('login-error').textContent = '✗ ' + (data.error || '登录失败');
                        document.getElementById('login-error').classList.add('show');
                    }
                }
            } catch (error) {
                console.log('在线登录失败，尝试本地模式:', error);
                
                // 网络错误，尝试本地验证
                const localUser = verifyLocalUser(username, password);
                if (localUser) {
                    localStorage.setItem('ai_journey_user', JSON.stringify({
                        userId: localUser.userId,
                        username: localUser.username,
                        mode: 'local'
                    }));
                    
                    document.getElementById('login-success').textContent = '✓ 登录成功（离线模式），正在进入游戏...';
                    document.getElementById('login-success').classList.add('show');
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    document.getElementById('login-error').textContent = '✗ 用户名或密码错误（后端服务不可用，请确认是否已注册）';
                    document.getElementById('login-error').classList.add('show');
                }
            }
            
            btn.disabled = false;
            btn.innerHTML = '登录';
        });

        // 本地存储用户数据（离线模式回退）
        function getLocalUsers() {
            try {
                return JSON.parse(localStorage.getItem('ai_journey_local_users') || '{}');
            } catch {
                return {};
            }
        }
        
        function saveLocalUser(username, password) {
            const users = getLocalUsers();
            const userId = 'local_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            users[username] = {
                userId,
                passwordHash: btoa(password), // 简单编码，非安全哈希
                createdAt: new Date().toISOString()
            };
            localStorage.setItem('ai_journey_local_users', JSON.stringify(users));
            return { userId, username };
        }
        
        function verifyLocalUser(username, password) {
            const users = getLocalUsers();
            const user = users[username];
            if (!user) return null;
            if (user.passwordHash !== btoa(password)) return null;
            return { userId: user.userId, username };
        }

        // 注册表单提交
        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value;
            const confirm = document.getElementById('reg-confirm').value;
            
            // 验证
            let hasError = false;
            if (!username) {
                document.getElementById('reg-username-error').classList.add('show');
                hasError = true;
            } else {
                document.getElementById('reg-username-error').classList.remove('show');
            }
            
            if (password.length < 6) {
                document.getElementById('reg-password-error').classList.add('show');
                hasError = true;
            } else {
                document.getElementById('reg-password-error').classList.remove('show');
            }
            
            if (password !== confirm) {
                document.getElementById('reg-confirm-error').classList.add('show');
                hasError = true;
            } else {
                document.getElementById('reg-confirm-error').classList.remove('show');
            }
            
            if (hasError) return;
            
            const btn = document.getElementById('register-btn');
            btn.disabled = true;
            btn.innerHTML = '注册中<span class="loading"></span>';
            
            // 先尝试在线注册
            let onlineSuccess = false;
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    onlineSuccess = true;
                    document.getElementById('register-success').textContent = '✓ 注册成功，请登录';
                    document.getElementById('register-success').classList.add('show');
                    
                    setTimeout(() => {
                        document.querySelector('[data-tab="login"]').click();
                        document.getElementById('login-username').value = username;
                    }, 1500);
                } else if (data.error && data.error.includes('已存在')) {
                    // 用户名已存在，显示错误
                    document.getElementById('register-error').textContent = '✗ ' + data.error;
                    document.getElementById('register-error').classList.add('show');
                    btn.disabled = false;
                    btn.innerHTML = '注册';
                    return;
                }
            } catch (error) {
                console.log('在线注册失败，切换到本地模式:', error);
            }
            
            // 如果在线注册失败，使用本地模式
            if (!onlineSuccess) {
                // 检查本地是否已存在
                const localUsers = getLocalUsers();
                if (localUsers[username]) {
                    document.getElementById('register-error').textContent = '✗ 用户名已存在';
                    document.getElementById('register-error').classList.add('show');
                    btn.disabled = false;
                    btn.innerHTML = '注册';
                    return;
                }
                
                // 本地注册
                const userData = saveLocalUser(username, password);
                
                document.getElementById('register-success').textContent = '✓ 注册成功（离线模式），请登录';
                document.getElementById('register-success').classList.add('show');
                
                setTimeout(() => {
                    document.querySelector('[data-tab="login"]').click();
                    document.getElementById('login-username').value = username;
                }, 1500);
            }
            
            btn.disabled = false;
            btn.innerHTML = '注册';
        });

        // 检查是否已登录
        const user = localStorage.getItem('ai_journey_user');
        if (user) {
            // 已登录，跳转到游戏
            window.location.href = 'index.html';
        }
    </script>
